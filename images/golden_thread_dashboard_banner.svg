<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 110" role="img" aria-label="The Golden Thread — construction site dashboard banner">
  <defs>
    <!-- Sky gradient: deep navy to slate -->
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="50%"  stop-color="#0f1e35"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <!-- Golden thread glow -->
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#78560a" stop-opacity="0.3"/>
      <stop offset="30%"  stop-color="#eab308" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#fbbf24"/>
      <stop offset="85%"  stop-color="#eab308" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#78560a" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Subtle steel glow for highlights -->
    <linearGradient id="steelH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#334155" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="110" fill="url(#sky)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0"    y1="0" x2="0"    y2="110"/>
    <line x1="140"  y1="0" x2="140"  y2="110"/>
    <line x1="280"  y1="0" x2="280"  y2="110"/>
    <line x1="420"  y1="0" x2="420"  y2="110"/>
    <line x1="560"  y1="0" x2="560"  y2="110"/>
    <line x1="700"  y1="0" x2="700"  y2="110"/>
    <line x1="840"  y1="0" x2="840"  y2="110"/>
    <line x1="980"  y1="0" x2="980"  y2="110"/>
    <line x1="1120" y1="0" x2="1120" y2="110"/>
    <line x1="1260" y1="0" x2="1260" y2="110"/>
    <line x1="1400" y1="0" x2="1400" y2="110"/>
    <line x1="0" y1="22" x2="1400" y2="22"/>
    <line x1="0" y1="44" x2="1400" y2="44"/>
    <line x1="0" y1="66" x2="1400" y2="66"/>
    <line x1="0" y1="88" x2="1400" y2="88"/>
  </g>

  <!-- ── CRANE (left side) ──────────────────────────────────── -->
  <g opacity="0.75">
    <!-- Mast -->
    <rect x="62" y="0" width="5" height="110" fill="#334155"/>
    <!-- Jib arm -->
    <line x1="64" y1="5" x2="160" y2="25" stroke="#475569" stroke-width="3"/>
    <!-- Counter-jib -->
    <line x1="64" y1="5" x2="20"  y2="22" stroke="#475569" stroke-width="2.5"/>
    <!-- Counter weight -->
    <rect x="10" y="20" width="12" height="8" rx="1" fill="#334155"/>
    <!-- Hoist cable -->
    <line x1="140" y1="25" x2="140" y2="55" stroke="#64748b" stroke-width="1.5"/>
    <rect x="133" y="54" width="15" height="9" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <!-- Trolley -->
    <rect x="136" y="22" width="8" height="5" rx="1" fill="#64748b"/>
  </g>

  <!-- ── SCAFFOLDING (left-centre) ──────────────────────────── -->
  <g opacity="0.6" stroke="#334155" stroke-width="2" fill="none">
    <!-- Verticals -->
    <line x1="200" y1="0" x2="200" y2="110"/>
    <line x1="230" y1="0" x2="230" y2="110"/>
    <line x1="260" y1="0" x2="260" y2="110"/>
    <line x1="290" y1="0" x2="290" y2="110"/>
    <!-- Horizontals -->
    <line x1="200" y1="28" x2="290" y2="28"/>
    <line x1="200" y1="56" x2="290" y2="56"/>
    <line x1="200" y1="84" x2="290" y2="84"/>
    <!-- Diagonals -->
    <line x1="200" y1="0"  x2="230" y2="28" stroke-width="1.2" opacity="0.7"/>
    <line x1="230" y1="0"  x2="260" y2="28" stroke-width="1.2" opacity="0.7"/>
    <line x1="260" y1="0"  x2="290" y2="28" stroke-width="1.2" opacity="0.7"/>
    <line x1="200" y1="28" x2="230" y2="56" stroke-width="1.2" opacity="0.7"/>
    <line x1="230" y1="28" x2="260" y2="56" stroke-width="1.2" opacity="0.7"/>
    <line x1="260" y1="28" x2="290" y2="56" stroke-width="1.2" opacity="0.7"/>
    <line x1="200" y1="56" x2="230" y2="84" stroke-width="1.2" opacity="0.7"/>
    <line x1="230" y1="56" x2="260" y2="84" stroke-width="1.2" opacity="0.7"/>
    <line x1="260" y1="56" x2="290" y2="84" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- ── BUILDING SILHOUETTE (right side) ───────────────────── -->
  <g opacity="0.45" fill="#1e3a5f">
    <!-- Main tower block -->
    <rect x="1050" y="15" width="80" height="95"/>
    <!-- Second block -->
    <rect x="1150" y="30" width="60" height="80"/>
    <!-- Third block -->
    <rect x="1230" y="20" width="90" height="90"/>
    <!-- Windows — tower -->
    <g fill="#0ea5e9" opacity="0.35">
      <rect x="1058" y="22" width="8" height="6" rx="1"/>
      <rect x="1072" y="22" width="8" height="6" rx="1"/>
      <rect x="1086" y="22" width="8" height="6" rx="1"/>
      <rect x="1058" y="35" width="8" height="6" rx="1"/>
      <rect x="1072" y="35" width="8" height="6" rx="1"/>
      <rect x="1086" y="35" width="8" height="6" rx="1"/>
      <rect x="1058" y="48" width="8" height="6" rx="1"/>
      <rect x="1072" y="48" width="8" height="6" rx="1"/>
      <rect x="1086" y="48" width="8" height="6" rx="1"/>
      <rect x="1058" y="61" width="8" height="6" rx="1"/>
      <rect x="1072" y="61" width="8" height="6" rx="1"/>
      <rect x="1086" y="61" width="8" height="6" rx="1"/>
    </g>
    <!-- Windows — right block -->
    <g fill="#0ea5e9" opacity="0.25">
      <rect x="1238" y="28" width="8" height="6" rx="1"/>
      <rect x="1252" y="28" width="8" height="6" rx="1"/>
      <rect x="1266" y="28" width="8" height="6" rx="1"/>
      <rect x="1280" y="28" width="8" height="6" rx="1"/>
      <rect x="1238" y="42" width="8" height="6" rx="1"/>
      <rect x="1252" y="42" width="8" height="6" rx="1"/>
      <rect x="1266" y="42" width="8" height="6" rx="1"/>
      <rect x="1280" y="42" width="8" height="6" rx="1"/>
    </g>
  </g>

  <!-- ── SCAFFOLDING (right side) ───────────────────────────── -->
  <g opacity="0.45" stroke="#334155" stroke-width="1.8" fill="none">
    <line x1="1040" y1="0"  x2="1040" y2="110"/>
    <line x1="1015" y1="0"  x2="1015" y2="110"/>
    <line x1="990"  y1="0"  x2="990"  y2="110"/>
    <line x1="990"  y1="25" x2="1040" y2="25"/>
    <line x1="990"  y1="55" x2="1040" y2="55"/>
    <line x1="990"  y1="85" x2="1040" y2="85"/>
    <line x1="990"  y1="0"  x2="1015" y2="25" stroke-width="1" opacity="0.6"/>
    <line x1="1015" y1="0"  x2="1040" y2="25" stroke-width="1" opacity="0.6"/>
    <line x1="990"  y1="25" x2="1015" y2="55" stroke-width="1" opacity="0.6"/>
    <line x1="1015" y1="25" x2="1040" y2="55" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- ── GOLDEN THREAD — the connecting line ────────────────── -->
  <path d="M 0,72 C 100,65 180,80 280,58 C 380,36 500,68 640,55 C 780,42 900,70 1040,50 C 1150,34 1260,62 1400,48"
        fill="none" stroke="url(#thread)" stroke-width="2.5" filter="url(#softglow)" opacity="0.95"/>

  <!-- Thread nodes / connection points -->
  <g filter="url(#glow)">
    <circle cx="280"  cy="58"  r="3.5" fill="#fbbf24" opacity="0.9"/>
    <circle cx="640"  cy="55"  r="3.5" fill="#fbbf24" opacity="0.9"/>
    <circle cx="1040" cy="50"  r="3.5" fill="#fbbf24" opacity="0.9"/>
  </g>

  <!-- ── STATUS CHIPS (right side) ─────────────────────────── -->
  <!-- Chip 1: LOLER Compliant -->
  <g transform="translate(770, 18)">
    <rect width="110" height="22" rx="11" fill="#14532d" opacity="0.85"/>
    <circle cx="14" cy="11" r="4" fill="#22c55e"/>
    <text x="24" y="15" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" fill="#86efac" letter-spacing="0.5">LOLER ACTIVE</text>
  </g>
  <!-- Chip 2: ISO Audit Ready -->
  <g transform="translate(770, 46)">
    <rect width="110" height="22" rx="11" fill="#1e3a5f" opacity="0.85"/>
    <circle cx="14" cy="11" r="4" fill="#38bdf8"/>
    <text x="24" y="15" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" fill="#7dd3fc" letter-spacing="0.5">ISO AUDIT READY</text>
  </g>
  <!-- Chip 3: Live Reports -->
  <g transform="translate(770, 74)">
    <rect width="110" height="22" rx="11" fill="#451a03" opacity="0.85"/>
    <circle cx="14" cy="11" r="4" fill="#f97316">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="24" y="15" font-family="Arial, sans-serif" font-size="9.5" font-weight="700" fill="#fdba74" letter-spacing="0.5">LIVE REPORTS</text>
  </g>

  <!-- ── BRANDING (left) ────────────────────────────────────── -->
  <g transform="translate(330, 22)">
    <text font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#f8fafc" letter-spacing="-0.5">
      The Golden Thread
    </text>
    <text y="26" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="0.8">
      LIVE SITE COMPLIANCE  ·  HAZARD TRACKING  ·  AUDIT-READY EVIDENCE
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="107" width="1400" height="3" fill="url(#thread)" opacity="0.7"/>
</svg>
