<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Golden Thread construction reporting hero</title>
  <desc id="desc">A dark construction-inspired digital site scene with golden audit thread, status panels, and steel grid lines.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="0.55" stop-color="#1f2b32"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8d35c"/>
      <stop offset="0.55" stop-color="#eab308"/>
      <stop offset="1" stop-color="#b2761f"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0v64" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g opacity="0.28" stroke="#ffffff" stroke-width="4" fill="none">
    <path d="M924 150v560M1030 118v592M1140 92v618M1248 146v564"/>
    <path d="M860 250h500M830 356h560M800 462h620M770 568h680"/>
    <path d="M924 150l524 418M1248 146L770 568"/>
  </g>
  <g opacity="0.4" fill="#020617">
    <rect x="1050" y="615" width="360" height="96" rx="10"/>
    <rect x="950" y="505" width="270" height="74" rx="10"/>
    <rect x="1184" y="388" width="228" height="74" rx="10"/>
  </g>
  <path d="M0 610 C230 530 365 672 570 568 C780 462 920 498 1118 568 C1310 636 1428 548 1600 506" fill="none" stroke="url(#gold)" stroke-width="11"/>
  <path d="M0 665 C255 565 394 720 602 606 C802 496 946 534 1128 612 C1314 692 1452 604 1600 574" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>
  <g transform="translate(1020 250)">
    <rect width="360" height="120" rx="14" fill="#0f172a" fill-opacity="0.72" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="28" y="42" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">WORKER CONFIRMATION</text>
    <text x="28" y="82" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800">Logged - High</text>
  </g>
  <g transform="translate(1100 410)">
    <rect width="330" height="116" rx="14" fill="#0f172a" fill-opacity="0.72" stroke="#eab308" stroke-opacity="0.5"/>
    <text x="28" y="42" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">MANAGER ALERT</text>
    <text x="28" y="82" fill="#fbbf24" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800">Sent in real time</text>
  </g>
  <g transform="translate(82 96)" fill="#ffffff">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#eab308">THE GOLDEN THREAD</text>
    <text x="0" y="46" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800">Site evidence, captured as work happens.</text>
  </g>
</svg>
